<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wuthering Waves</title>
    <script>
      (function () {
        const name = 'Wuthering Waves';
        const frames = [
          '◈ ' + name + ' ◈',
          '◈ ' + name + ' ◇',
          '◇ ' + name + ' ◇',
          '◇ ' + name + ' ◈',
        ];
        let i = 0;
        function tick() {
          document.title = frames[i % frames.length];
          i++;
          setTimeout(tick, 700);
        }
        window.addEventListener('DOMContentLoaded', tick);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
